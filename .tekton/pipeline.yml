apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: cd-pipeline
spec:
  params:
    - name: repo-url
      type: string
      default: https://github.com/Jefferyt46/ci-cd-final-project.git
    - name: revision
      type: string
      default: main
    - name: app-name
      type: string
      default: ci-cd-final-project
    - name: build-image
      type: string
  workspaces:
    - name: output
  tasks:
    - name: cleanup
      taskRef:
        name: cleanup
      workspaces:
        - name: source
          workspace: output

    - name: git-clone
      runAfter:
        - cleanup
      taskRef:
        name: git-clone
        kind: ClusterTask
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
        - name: deleteExisting
          value: "true"
      workspaces:
        - name: output
          workspace: output

    - name: flake8
      runAfter:
        - git-clone
      taskRef:
        name: flake8
      workspaces:
        - name: source
          workspace: output

    - name: nose
      runAfter:
        - flake8
      taskRef:
        name: nose
      params:
        - name: args
          value: "-v"
      workspaces:
        - name: source
          workspace: output

    - name: buildah
      runAfter:
        - nose
      taskRef:
        name: buildah
        kind: ClusterTask
      params:
        - name: IMAGE
          value: $(params.build-image)
        - name: TLSVERIFY
          value: "false"
      workspaces:
        - name: source
          workspace: output

    - name: deploy
      runAfter:
        - buildah
      taskRef:
        name: openshift-client
        kind: ClusterTask
      params:
        - name: SCRIPT
          value: |
            oc create deployment $(params.app-name) --image=$(params.build-image) --dry-run=client -o yaml | oc apply -f -
